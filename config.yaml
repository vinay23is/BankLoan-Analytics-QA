dataset:
  path: data/financial_loan.csv
  id_column: id

critical_columns:
  - loan_amount
  - int_rate
  - loan_status
  - grade
  - issue_date

validation_rules:
  int_rate:
    min: 0.05   # stored as decimal in this dataset (0.05 = 5%)
    max: 0.30   # 30% upper bound
  dti:
    min: 0.0
    max: 100.0
  loan_amount:
    min: 1.0
  allowed_loan_status:
    - Fully Paid
    - Current
    - Charged Off
  allowed_term:
    - " 36 months"   # dataset includes leading space
    - " 60 months"
  allowed_grade:
    - A
    - B
    - C
    - D
    - E
    - F
    - G

reconciliation:
  tolerance: 0.01
